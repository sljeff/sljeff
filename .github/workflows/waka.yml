name: Update wakatime stats

on:
  push:
    branches: [master, fix-wakatime-direct-readme]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * *"

jobs:
  build:
    name: Update-waka-stats
    runs-on: ubuntu-latest
    env:
      README: README.md
      WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: python -m unittest test_update_readme.py
      - name: Edit README
        run: |
          python update_readme.py
          git config --global user.email "bot@github.com" && git config --global user.name "Waka-Bot"
          git diff
          git add README.md && git commit -m ":memo: update profile" || exit 0
          git pull && git push
